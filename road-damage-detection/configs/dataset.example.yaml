# Copy to dataset.yaml and set `path` to your YOLO-format dataset root.
#
# Expected layout:
#   <path>/
#     images/train/*.jpg
#     images/val/*.jpg
#     labels/train/*.txt   (YOLO bbox: class cx cy w h normalized)
#     labels/val/*.txt

path: ./data/yolo_dataset
train: images/train
val: images/val

names:
  0: pothole
  1: alligator_crack
  2: longitudinal_transverse_crack
  3: edge_break
  4: faded_lane_marking
  5: broken_sign
  6: missing_sign
  7: guardrail_damage
  8: no_damage
